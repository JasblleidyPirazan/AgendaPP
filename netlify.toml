[build]
  publish = "dashboard/public"
  command = "mkdir -p dashboard/public/data && cp analysis/exports/metrics.json dashboard/public/data/metrics.json && echo 'metrics.json copiado'"

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
