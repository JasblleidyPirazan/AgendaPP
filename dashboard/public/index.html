<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Análisis temático de agendas de concejales municipales" />
  <meta name="theme-color" content="#4f46e5" />
  <title>AgendaPP — Dashboard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="/styles.css" />
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" defer></script>
</head>
<body>
  <header>
    <div class="header-top">
      <div>
        <h1>AgendaPP</h1>
        <p class="subtitle">Análisis temático de agendas de concejales municipales</p>
      </div>
      <div class="acciones">
        <button id="btn-recalcular" class="primario" title="Vuelve a pedir datos crudos al endpoint (con nocache=1) y recalcula Shannon/Jaccard/Pearson en el navegador.">
          ↻ Recalcular
        </button>
        <button id="btn-descargar" title="Descarga las métricas en JSON con los filtros activos, calculadas por Temática y por Sector (si hay endpoint).">
          ↓ Descargar JSON
        </button>
        <button id="btn-descargar-clasif" title="Descarga las métricas en JSON separadas por Clasificación legal (Acuerdo, Proyecto de Acuerdo, ...), cada una por Temática y por Sector. Respeta los filtros de rol y municipio activos.">
          ↓ JSON por clasificación
        </button>
        <span id="estado-recalculo" class="estado"></span>
      </div>
    </div>
    <nav>
      <button data-view="resumen" class="active">Resumen</button>
      <button data-view="instrumentos">Instrumentos</button>
      <button data-view="partidos">Partidos</button>
      <button data-view="shannon">Diversidad indiv. (H)</button>
      <button data-view="shannon_partido">Diversidad partido (H)</button>
      <button data-view="jaccard">Convergencia (J)</button>
      <button data-view="corr">Inter-partido</button>
      <button data-view="comparar">Comparativa</button>
      <button data-view="contadores">Contadores</button>
      <button data-view="camaleones">Camaleones</button>
      <button data-view="auditoria">Auditoría</button>
    </nav>

    <div id="barra-filtros" class="barra-filtros" hidden>
      <span class="filtros-titulo">Filtros</span>
      <div class="filtro-grupo">
        <span class="filtro-label">Nivel:</span>
        <span id="filtro-nivel" class="filtro-chips"></span>
      </div>
      <div class="filtro-grupo">
        <span class="filtro-label">Roles:</span>
        <span id="filtro-roles" class="filtro-chips"></span>
      </div>
      <div class="filtro-grupo">
        <span class="filtro-label">Municipios:</span>
        <span id="filtro-municipios" class="filtro-chips"></span>
      </div>
      <div class="filtro-grupo">
        <span class="filtro-label">Clasificación:</span>
        <span id="filtro-clasificacion" class="filtro-chips"></span>
      </div>
      <span id="filtros-estado" class="filtros-estado"></span>
    </div>
  </header>

  <main>
    <div id="aviso-endpoint" class="aviso-endpoint" hidden></div>
    <section id="view-resumen" class="view active"></section>
    <section id="view-instrumentos" class="view"></section>
    <section id="view-partidos" class="view"></section>
    <section id="view-shannon" class="view"></section>
    <section id="view-shannon_partido" class="view"></section>
    <section id="view-jaccard" class="view"></section>
    <section id="view-corr" class="view"></section>
    <section id="view-comparar" class="view"></section>
    <section id="view-contadores" class="view"></section>
    <section id="view-camaleones" class="view"></section>
    <section id="view-auditoria" class="view"></section>
  </main>

  <footer>
    <span id="generado-en"></span>
    <span class="separator">•</span>
    <a href="https://github.com/JasblleidyPirazan/AgendaPP" target="_blank" rel="noreferrer">repo</a>
  </footer>

  <script type="module" src="/src/app.js"></script>
</body>
</html>
