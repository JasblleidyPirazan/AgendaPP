<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgendaPP — Dashboard</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" defer></script>
</head>
<body>
  <header>
    <h1>AgendaPP</h1>
    <p class="subtitle">Análisis temático de agendas de concejales municipales</p>
    <nav>
      <button data-view="resumen" class="active">Resumen</button>
      <button data-view="instrumentos">Instrumentos</button>
      <button data-view="shannon">Diversidad (H)</button>
      <button data-view="cv">Uniformidad (CV)</button>
      <button data-view="jaccard">Convergencia (J)</button>
      <button data-view="corr">Inter-partido</button>
      <button data-view="auditoria">Auditoría</button>
    </nav>
  </header>

  <main>
    <section id="view-resumen" class="view active"></section>
    <section id="view-instrumentos" class="view"></section>
    <section id="view-shannon" class="view"></section>
    <section id="view-cv" class="view"></section>
    <section id="view-jaccard" class="view"></section>
    <section id="view-corr" class="view"></section>
    <section id="view-auditoria" class="view"></section>
  </main>

  <footer>
    <span id="generado-en"></span>
    <span class="separator">•</span>
    <a href="https://github.com/" target="_blank" rel="noreferrer">repo</a>
  </footer>

  <script type="module" src="/src/app.js"></script>
</body>
</html>
